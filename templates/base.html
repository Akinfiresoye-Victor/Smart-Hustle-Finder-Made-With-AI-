{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hustle Finder - AI Market Insights</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sticky-nav">
        <div class="container nav-container">
            <a href="{% url 'home' %}" class="logo">Smart <span>Hustle</span> Finder</a>
            <div class="nav-links">
                <a href="{% url 'home' %}" class="nav-link">New Search</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-container">
            <p>&copy; 2026 Smart Hustle Finder. Powered by AI Insights.</p>
            <p class="footer-credit">Built with Django | Powered by Smart Hustle Finder</p>
