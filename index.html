<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hustle Finder</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        header { margin-bottom: 3rem; animation: fadeIn 0.8s ease-out; }

        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; color: #fff; }
        .subtitle { font-size: 1.25rem; color: var(--text-secondary); margin-bottom: 2rem; }

        .input-group {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
        }

        .field { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); }

        input {
            background: #0f172a;
            border: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover { background: #4f46e5; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #results-section {
            display: none;
            width: 100%;
            margin-top: 3rem;
            text-align: left;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .section-title { font-size: 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid var(--accent-color); padding-left: 1rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 1rem;
            transition: var(--transition);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent-color); }

        .card h3 { margin-bottom: 0.5rem; color: #fff; }
        .card .badge { 
            display: inline-block; padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.8rem; font-weight: 700; margin-bottom: 1rem;
            background: rgba(99, 102, 241, 0.2); color: var(--accent-color);
        }

        .card p { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.5; }

        .job-titles { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .job-tag { background: rgba(255,255,255,0.05); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }

        #market-summary {
            background: rgba(99, 102, 241, 0.05);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px dashed var(--accent-color);
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .error-msg { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 1rem; border-radius: 0.5rem; border: 1px solid rgba(239, 68, 68, 0.2); margin-top: 1rem; display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Smart Hustle Finder</h1>
            <p class="subtitle">Discover what the job market actually wants</p>
        </header>

        <div class="input-group">
            <div class="field">
                <label for="api-key">Anthropic API Key</label>
                <input type="password" id="api-key" placeholder="sk-ant-...">
            </div>
            <div class="field">
                <label for="skill-input">Your Skillset</label>
                <input type="text" id="skill-input" placeholder="Enter your skill (e.g. Python, Flask...)" onkeypress="if(event.key==='Enter') handleAnalysis()">
            </div>
            <button id="analyze-btn" onclick="handleAnalysis()">Analyze Market Demand</button>
            <div id="error-box" class="error-msg"></div>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: var(--text-secondary);">Scanning the market...</p>
        </div>

        <main id="results-section">
            <section>
                <h2 class="section-title">Top In-Demand Skills</h2>
                <div id="top-skills-grid" class="grid"></div>
            </section>

            <section>
                <h2 class="section-title">Skill Gap Analyzer</h2>
                <div id="skill-gaps-grid" class="grid"></div>
            </section>

            <section>
                <h2 class="section-title">Market Summary</h2>
                <div id="market-summary"></div>
            </section>
        </main>
    </div>

    <script>
        function simulateJobListings(skill) {
            const templates = [
                "Looking for {skill} developer with experience in building scalable backend systems.",
                "Need {skill} specialist for a high-priority cloud migration project.",
                "Hiring {skill} lead to oversee our new API-first architecture.",
                "Junior {skill} openings for rapid-growth fintech startup.",
                "Freelance opportunity: Help us modernize our {skill} stack with automated testing.",
                "Senior {skill} Engineer: Must know modern design patterns and CI/CD pipelines.",
                "Contract role: {skill} developer with strong troubleshooting and debugging skills.",
                "Full-stack developer with {skill} proficiency wanted for real-time data visualizer.",
                "Engineering Manager with {skill} background to lead a team of 10 developers.",
                "Technical Architect: Designing next-gen platforms using {skill} and serverless technology."
            ];
            
            return templates.map(t => t.replace(/{skill}/g, skill));
        }

        async function analyzeWithAI(apiKey, skill, jobListings) {
            const prompt = `Analyze the following simulated job listings for the skill: "${skill}".
Listings:
${jobListings.join('\n')}

Role: Industry Expert Technical Recruiter.
Return ONLY a valid JSON object with this exact structure:
{
  "top_skills": [
    {
      "skill": "string",
      "demand_level": "High or Medium",
      "explanation": "string",
      "job_titles": ["string", "string", "string"]
    }
  ],
  "skill_gaps": [
    {
      "missing_skill": "string",
      "why_needed": "string",
      "how_to_learn": "string"
    }
  ],
  "market_summary": "string"
}

Do not include markdown fences, thoughts, or explanations outside the JSON.`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1500,
                    messages: [{ role: 'user', content: prompt }]
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || 'API request failed');
            }

            const data = await response.json();
            const text = data.content[0].text.trim();
            
            // Basic extraction in case of unexpected text
            const start = text.indexOf('{');
            const end = text.lastIndexOf('}');
            if (start === -1 || end === -1) throw new Error("Invalid response format from AI");
            
            return JSON.parse(text.substring(start, end + 1));
        }

        function renderResults(data) {
            const topGrid = document.getElementById('top-skills-grid');
            const gapsGrid = document.getElementById('skill-gaps-grid');
            const summaryDiv = document.getElementById('market-summary');

            topGrid.innerHTML = '';
            gapsGrid.innerHTML = '';

            data.top_skills.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="badge">${item.demand_level} Demand</span>
                    <h3>${item.skill}</h3>
                    <p>${item.explanation}</p>
                    <div class="job-titles">
                        ${item.job_titles.map(t => `<span class="job-tag">${t}</span>`).join('')}
                    </div>
                `;
                topGrid.appendChild(card);
            });

            data.skill_gaps.forEach(gap => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.borderLeft = '4px solid var(--accent-color)';
                card.innerHTML = `
                    <h3>${gap.missing_skill}</h3>
                    <p><strong>Why:</strong> ${gap.why_needed}</p>
                    <p style="margin-top:0.5rem"><strong>Path:</strong> ${gap.how_to_learn}</p>
                `;
                gapsGrid.appendChild(card);
            });

            summaryDiv.textContent = data.market_summary;
        }

        async function handleAnalysis() {
            const apiKey = document.getElementById('api-key').value.trim();
            const skill = document.getElementById('skill-input').value.trim();
            const btn = document.getElementById('analyze-btn');
            const loader = document.getElementById('loader');
            const results = document.getElementById('results-section');
            const errorBox = document.getElementById('error-box');

            if (!apiKey || !skill) {
                errorBox.textContent = "Please provide both an API Key and a Skill.";
                errorBox.style.display = 'block';
                return;
            }

            errorBox.style.display = 'none';
            btn.disabled = true;
            loader.style.display = 'flex';
            results.style.display = 'none';

            try {
                const listings = simulateJobListings(skill);
                const data = await analyzeWithAI(apiKey, skill, listings);
                renderResults(data);
                results.style.display = 'block';
            } catch (err) {
                errorBox.textContent = "Error: " + err.message;
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
